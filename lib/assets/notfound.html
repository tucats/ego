<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1d23;
    }

    .card {
      background: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(37, 99, 235, 0.10);
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }

    .code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      color: #dbeafe;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1d23;
      margin-bottom: 1rem;
    }

    .message {
      font-size: 0.9375rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }

    .path {
      display: inline-block;
      font-family: ui-monospace, 'SFMono-Regular', Consolas, monospace;
      font-size: 0.875rem;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 0.2rem 0.55rem;
      color: #374151;
      word-break: break-all;
      margin: 0.25rem 0 1.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: center;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.4rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }
    .btn-primary:hover { background: #1d4ed8; }

    .btn-secondary {
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover { background: #f9fafb; }

    .divider {
      width: 40px;
      height: 1px;
      background: #e5e7eb;
      margin: 1.25rem auto;
    }

    .hint {
      font-size: 0.8125rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p class="message">The address you requested was not found on this server.</p>
    <span class="path">__PATH__</span>

    <div class="links">
      <a class="btn btn-primary" href="/ui">Go to Dashboard</a>
      <a class="btn btn-secondary" href="javascript:history.back()">Go Back</a>
    </div>

    <div class="divider"></div>
    <p class="hint">If you believe this address should exist, check the server configuration or contact your administrator.</p>
  </div>
</body>
</html>
